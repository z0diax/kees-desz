<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited - Kees & Desz</title>
    <link rel="stylesheet" href="intro.css">
</head>
<body>
    <div class="intro-container">
        <div class="envelope-section">
            <!-- Header Text -->
            <div class="header-text">
                <h3>Kees & Desz</h3>
                <p>06.27.2026</p>
            </div>

            <!-- Envelope Container -->
            <div class="envelope-wrapper">
                <!-- Closed Envelope -->
                <div class="envelope-image closed">
                    <img src="assets/1.png" alt="Closed Envelope">
                    <div class="seal-overlay">
                        <div class="seal-circle" role="button" tabindex="0" aria-label="Open invitation">
                            <img class="seal-crest" src="assets/logo.png" alt="" aria-hidden="true">
                        </div>
                    </div>
                </div>

                <!-- Opened Envelope -->
                <div class="envelope-image opened">
                    <img src="assets/2.png" alt="Opened Envelope">
                </div>
            </div>

            <!-- Footer Text -->
            <div class="footer-text">
                <p>Click the seal to open the envelope</p>
            </div>
        </div>
    </div>

    <script src="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;500;600;700&family=Montserrat:wght@100;200;300;400;500&display=swap"></script>
    <script src="intro-script.js"></script>
</body>
</html>
